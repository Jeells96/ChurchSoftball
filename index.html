<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>League Scorebook</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Roboto+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  /* ---------- Tokens: a real scorebook page ---------- */
  :root{
    --paper:#f6efdc;          /* warm scorecard cream */
    --paper-2:#efe6cf;        /* slightly deeper paper */
    --ink:#26211a;            /* pencil/ink */
    --ink-soft:#6d6552;
    --field:#1f4d3a;          /* dugout green chrome */
    --field-2:#163a2c;
    --chalk:#fbfaf3;          /* chalk line white */
    --seam:#b0271f;           /* baseball seam red */
    --seam-soft:rgba(176,39,31,.14);
    --grid:#86a596;           /* printed scorebook grid line (muted green) */
    --grid-soft:#cdd9cf;
    --gold:#c9a14a;
    --shadow:0 10px 30px rgba(22,40,30,.18);
    --r:12px;
    --safe-t:env(safe-area-inset-top,0px);
    --safe-b:env(safe-area-inset-bottom,0px);
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;height:100%;}
  body{
    font-family:"Oswald",system-ui,-apple-system,"Segoe UI",sans-serif;
    background:
      radial-gradient(120% 80% at 50% -10%, #235540 0%, var(--field-2) 55%, #102a20 100%);
    color:var(--ink);
    -webkit-text-size-adjust:100%;
    overflow:hidden;
  }
  .mono{font-family:"Roboto Mono",ui-monospace,Menlo,monospace;}
  button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit;}
  input,select{font-family:inherit;font-size:16px;}

  /* ---------- App shell ---------- */
  #app{display:flex;flex-direction:column;height:100%;}
  header.appbar{
    padding:calc(var(--safe-t) + 10px) 14px 10px;
    background:linear-gradient(180deg,var(--field) 0%, var(--field-2) 100%);
    color:var(--chalk);
    display:flex;align-items:center;gap:10px;
    box-shadow:0 4px 18px rgba(0,0,0,.25);
    z-index:30;
  }
  .brand{display:flex;align-items:center;gap:10px;min-width:0;flex:1;}
  .seam-ball{
    width:30px;height:30px;border-radius:50%;
    background:radial-gradient(circle at 35% 30%,#fff 0%,#f3f0e7 60%,#ded8c6 100%);
    position:relative;flex:none;box-shadow:inset 0 0 0 1px rgba(0,0,0,.08),0 1px 2px rgba(0,0,0,.3);
  }
  .seam-ball::before,.seam-ball::after{
    content:"";position:absolute;top:5px;bottom:5px;width:10px;
    border:1.6px solid var(--seam);border-top:none;border-bottom:none;border-radius:50%;
  }
  .seam-ball::before{left:5px;border-right:none;}
  .seam-ball::after{right:5px;border-left:none;}
  .brand h1{
    font-size:19px;font-weight:600;letter-spacing:.14em;text-transform:uppercase;
    margin:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  }
  .brand .sub{font-size:10px;letter-spacing:.28em;color:var(--gold);text-transform:uppercase;}
  .appbar .iconbtn{
    color:var(--chalk);background:rgba(255,255,255,.1);border-radius:9px;
    width:38px;height:38px;font-size:18px;display:grid;place-items:center;flex:none;
  }
  .appbar .iconbtn:active{background:rgba(255,255,255,.22);}

  /* ---------- Tabs ---------- */
  nav.tabs{
    display:flex;background:var(--field-2);padding:0 6px;gap:2px;z-index:25;
  }
  nav.tabs button{
    flex:1;padding:11px 4px;color:rgba(255,255,255,.6);
    font-size:11px;letter-spacing:.12em;text-transform:uppercase;font-weight:500;
    border-bottom:3px solid transparent;display:flex;flex-direction:column;align-items:center;gap:3px;
  }
  nav.tabs button .ti{font-size:17px;line-height:1;}
  nav.tabs button.active{color:var(--chalk);border-bottom-color:var(--gold);}

  main{flex:1;overflow:auto;-webkit-overflow-scrolling:touch;background:var(--paper);position:relative;}
  .wrap{padding:16px 14px calc(40px + var(--safe-b));max-width:760px;margin:0 auto;}

  /* ---------- Generic UI ---------- */
  .section-eyebrow{font-size:11px;letter-spacing:.26em;text-transform:uppercase;color:var(--seam);font-weight:600;margin:2px 0 10px;}
  .card{
    background:var(--chalk);border:1px solid var(--grid-soft);border-radius:var(--r);
    box-shadow:0 2px 8px rgba(40,55,45,.06);margin-bottom:12px;overflow:hidden;
  }
  .card-pad{padding:14px;}
  .row{display:flex;align-items:center;gap:10px;}
  .row.wrap{flex-wrap:wrap;}
  .grow{flex:1;min-width:0;}
  .btn{
    background:var(--field);color:var(--chalk);border-radius:10px;padding:12px 16px;
    font-size:14px;letter-spacing:.08em;text-transform:uppercase;font-weight:600;
    display:inline-flex;align-items:center;justify-content:center;gap:8px;
  }
  .btn:active{transform:translateY(1px);}
  .btn.seam{background:var(--seam);}
  .btn.ghost{background:transparent;color:var(--field);border:1.5px solid var(--field);}
  .btn.sm{padding:8px 12px;font-size:12px;border-radius:8px;}
  .btn.block{width:100%;}
  .btn[disabled]{opacity:.4;}
  .pill{
    display:inline-flex;align-items:center;gap:6px;background:var(--paper-2);
    border:1px solid var(--grid-soft);border-radius:999px;padding:5px 11px;font-size:12px;
    letter-spacing:.04em;color:var(--ink-soft);
  }
  label.field{display:block;margin-bottom:10px;}
  label.field span{display:block;font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--ink-soft);margin-bottom:4px;}
  input.inp,select.sel{
    width:100%;padding:11px 12px;border:1.5px solid var(--grid-soft);border-radius:9px;
    background:var(--paper);color:var(--ink);
  }
  input.inp:focus,select.sel:focus{outline:none;border-color:var(--field);}
  .muted{color:var(--ink-soft);}
  .empty{text-align:center;color:var(--ink-soft);padding:40px 16px;}
  .empty .big{font-size:40px;opacity:.5;margin-bottom:8px;}
  .list-item{display:flex;align-items:center;gap:12px;padding:12px 14px;border-bottom:1px solid var(--grid-soft);}
  .list-item:last-child{border-bottom:none;}
  .avatar{width:38px;height:38px;border-radius:50%;background:var(--field);color:var(--chalk);
    display:grid;place-items:center;font-weight:600;font-size:14px;flex:none;}
  .tag{font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--ink-soft);}
  .linkbtn{color:var(--seam);font-size:12px;letter-spacing:.06em;text-transform:uppercase;font-weight:600;}

  /* ---------- Scorebook grid ---------- */
  .sb-head{
    display:flex;align-items:center;gap:10px;padding:10px 12px;background:var(--chalk);
    border:1px solid var(--grid-soft);border-radius:var(--r);margin-bottom:10px;flex-wrap:wrap;
  }
  .teamtoggle{display:flex;background:var(--paper-2);border-radius:10px;padding:3px;border:1px solid var(--grid-soft);}
  .teamtoggle button{padding:8px 14px;border-radius:8px;font-size:13px;font-weight:600;letter-spacing:.04em;color:var(--ink-soft);max-width:46vw;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .teamtoggle button.active{background:var(--field);color:var(--chalk);}

  .linescore{width:100%;border-collapse:collapse;margin-bottom:10px;background:var(--chalk);border:1px solid var(--grid-soft);border-radius:var(--r);overflow:hidden;}
  .linescore th,.linescore td{border:1px solid var(--grid-soft);padding:5px 0;text-align:center;font-size:12px;}
  .linescore th{background:var(--field);color:var(--chalk);font-weight:500;letter-spacing:.04em;}
  .linescore td.tm{text-align:left;padding-left:8px;font-weight:600;white-space:nowrap;font-family:"Oswald";}
  .linescore .rhe{background:var(--paper-2);font-weight:700;}

  .grid-scroll{overflow:auto;-webkit-overflow-scrolling:touch;border:1px solid var(--grid);border-radius:10px;background:var(--paper);}
  table.scoregrid{border-collapse:collapse;}
  table.scoregrid th,table.scoregrid td{border:1px solid var(--grid);padding:0;}
  table.scoregrid thead th{
    background:var(--field);color:var(--chalk);font-weight:500;font-size:12px;letter-spacing:.08em;
    height:34px;position:sticky;top:0;z-index:5;
  }
  .col-order{width:26px;min-width:26px;}
  .col-name{width:128px;min-width:128px;position:sticky;left:0;z-index:6;background:var(--paper);}
  thead .col-name{z-index:8;background:var(--field);}
  .col-inn{width:62px;min-width:62px;}
  .col-stat{width:30px;min-width:30px;}
  td.namecell{
    position:sticky;left:0;z-index:4;background:var(--paper);
    padding:4px 6px;border-right:2px solid var(--grid);
  }
  td.namecell .nm{font-size:13px;font-weight:500;line-height:1.05;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  td.namecell .pos{font-size:9px;letter-spacing:.1em;color:var(--ink-soft);text-transform:uppercase;}
  td.ordercell{text-align:center;font-size:11px;color:var(--ink-soft);background:var(--paper-2);font-weight:600;}
  td.statcell{text-align:center;font-size:12px;background:var(--paper-2);}
  thead .col-stat{font-size:10px;letter-spacing:.04em;}
  tfoot td{background:var(--field);color:var(--chalk);text-align:center;font-size:12px;font-weight:500;height:30px;}
  tfoot td.lbl{position:sticky;left:0;text-align:right;padding-right:8px;background:var(--field-2);}

  /* diamond cell */
  .cellbtn{display:block;width:62px;height:58px;position:relative;background:var(--paper);}
  .cellbtn:active{background:#efe7d0;}
  .cellbtn svg{display:block;width:100%;height:100%;}
  .outnum{position:absolute;top:2px;right:3px;font-size:9px;color:var(--seam);font-weight:700;font-family:"Roboto Mono";}
  .rbidot{position:absolute;bottom:2px;left:3px;font-size:8px;color:var(--field);font-family:"Roboto Mono";font-weight:700;}
  .addbat{margin-top:10px;}

  /* ---------- Modal / sheet ---------- */
  .scrim{position:fixed;inset:0;background:rgba(16,30,22,.55);z-index:50;display:flex;align-items:flex-end;justify-content:center;
    opacity:0;pointer-events:none;transition:opacity .18s;}
  .scrim.open{opacity:1;pointer-events:auto;}
  .sheet{
    width:100%;max-width:560px;background:var(--paper);border-radius:18px 18px 0 0;
    max-height:92vh;overflow:auto;-webkit-overflow-scrolling:touch;
    transform:translateY(20px);transition:transform .2s;box-shadow:var(--shadow);
    padding:8px 16px calc(20px + var(--safe-b));
  }
  .scrim.open .sheet{transform:translateY(0);}
  .sheet .grip{width:42px;height:5px;border-radius:3px;background:var(--grid-soft);margin:8px auto 12px;}
  .sheet h2{font-size:17px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;margin:0 0 2px;}
  .sheet .sh-sub{font-size:12px;color:var(--ink-soft);letter-spacing:.04em;margin-bottom:14px;}
  .group-label{font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:var(--ink-soft);margin:14px 0 7px;}
  .btn-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:7px;}
  .btn-grid.five{grid-template-columns:repeat(5,1fr);}
  .opt{
    padding:11px 4px;border-radius:9px;border:1.5px solid var(--grid-soft);background:var(--chalk);
    font-size:13px;font-weight:600;letter-spacing:.03em;text-align:center;color:var(--ink);
  }
  .opt.hit{border-color:#bcd3c4;}
  .opt.out{color:var(--seam);}
  .opt.sel{background:var(--field);color:var(--chalk);border-color:var(--field);}
  .opt.out.sel{background:var(--seam);border-color:var(--seam);color:#fff;}

  .diamond-edit{display:flex;align-items:center;gap:16px;margin-top:6px;}
  .diamond-edit svg{width:128px;height:128px;flex:none;}
  .base-dot{fill:var(--chalk);stroke:var(--ink-soft);stroke-width:2;}
  .base-dot.reached{fill:var(--field);stroke:var(--field);}
  .base-dot.scored{fill:var(--seam);stroke:var(--seam);}
  .de-side{flex:1;}
  .stepper{display:flex;align-items:center;gap:0;border:1.5px solid var(--grid-soft);border-radius:9px;overflow:hidden;width:fit-content;}
  .stepper button{width:42px;height:40px;font-size:20px;background:var(--chalk);color:var(--field);}
  .stepper .val{width:46px;text-align:center;font-size:18px;font-weight:700;font-family:"Roboto Mono";}
  .sheet-actions{display:flex;gap:10px;margin-top:18px;}

  .notation-row{display:flex;gap:8px;align-items:center;margin-top:10px;}
  .notation-row input{flex:1;}
  .chiprow{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px;}
  .chip{font-size:11px;padding:6px 9px;border-radius:7px;background:var(--paper-2);border:1px solid var(--grid-soft);font-family:"Roboto Mono";color:var(--ink-soft);}
  .chip:active{background:var(--field);color:#fff;}

  /* stats table */
  .scope-row{display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap;}
  .scope-row select{flex:1;min-width:120px;}
  .stats-scroll{overflow:auto;-webkit-overflow-scrolling:touch;border:1px solid var(--grid-soft);border-radius:var(--r);background:var(--chalk);}
  table.stats{border-collapse:collapse;width:100%;font-family:"Roboto Mono";}
  table.stats th,table.stats td{padding:8px 7px;text-align:right;font-size:12px;border-bottom:1px solid var(--grid-soft);white-space:nowrap;}
  table.stats th{background:var(--field);color:var(--chalk);position:sticky;top:0;font-weight:500;letter-spacing:.02em;cursor:pointer;}
  table.stats th.lname,table.stats td.lname{text-align:left;position:sticky;left:0;background:var(--chalk);z-index:2;font-family:"Oswald";}
  table.stats th.lname{background:var(--field);z-index:3;}
  table.stats tr:nth-child(even) td{background:var(--paper);}
  table.stats tr:nth-child(even) td.lname{background:var(--paper);}
  table.stats td.hl{color:var(--seam);font-weight:700;}

  .standings td,.standings th{font-family:"Oswald";}
  .toast{
    position:fixed;left:50%;bottom:calc(24px + var(--safe-b));transform:translateX(-50%) translateY(20px);
    background:var(--ink);color:var(--paper);padding:11px 18px;border-radius:10px;font-size:13px;letter-spacing:.04em;
    opacity:0;pointer-events:none;transition:all .22s;z-index:80;box-shadow:var(--shadow);
  }
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
  .reorder{display:flex;flex-direction:column;gap:2px;}
  .reorder button{width:30px;height:22px;font-size:12px;background:var(--paper-2);border-radius:5px;color:var(--field);}
  .fab-note{font-size:11px;color:var(--ink-soft);text-align:center;margin-top:8px;letter-spacing:.04em;}
  .seg{display:flex;border:1px solid var(--grid-soft);border-radius:9px;overflow:hidden;}
  .seg button{flex:1;padding:9px 4px;font-size:12px;letter-spacing:.06em;text-transform:uppercase;color:var(--ink-soft);background:var(--chalk);font-weight:600;}
  .seg button.active{background:var(--field);color:var(--chalk);}
  .hint{font-size:12px;color:var(--ink-soft);line-height:1.4;margin-top:6px;}
  .danger{color:var(--seam);}
</style>
</head>
<body>
<div id="app">
  <header class="appbar">
    <div class="brand">
      <div class="seam-ball"></div>
      <div style="min-width:0">
        <div class="sub" id="leagueSub">Church Softball</div>
        <h1 id="leagueName">League Scorebook</h1>
      </div>
    </div>
    <button class="iconbtn" id="menuBtn" aria-label="Menu">⚙</button>
  </header>

  <nav class="tabs" id="tabs">
    <button data-tab="games" class="active"><span class="ti">⚾</span>Games</button>
    <button data-tab="score"><span class="ti">📖</span>Scorebook</button>
    <button data-tab="stats"><span class="ti">📊</span>Stats</button>
    <button data-tab="roster"><span class="ti">👥</span>Teams</button>
  </nav>

  <main id="main"><div class="wrap" id="view"></div></main>
</div>

<div class="scrim" id="scrim"><div class="sheet" id="sheet"></div></div>
<div class="toast" id="toast"></div>

<script>
"use strict";
/* ============================================================
   Church Softball League Scorebook  —  single-file, offline-first
   Data lives in localStorage. Stats roll up automatically:
   plate appearances -> game -> season -> career.
============================================================ */

/* ---------- Result definitions (slow-pitch softball) ---------- */
const RESULTS = {
  '1B':{lbl:'1B', ab:1, hit:1, bases:1, tb:1, out:0, kind:'hit'},
  '2B':{lbl:'2B', ab:1, hit:1, bases:2, tb:2, out:0, kind:'hit'},
  '3B':{lbl:'3B', ab:1, hit:1, bases:3, tb:3, out:0, kind:'hit'},
  'HR':{lbl:'HR', ab:1, hit:1, bases:4, tb:4, out:0, kind:'hit', autoScore:1},
  'BB':{lbl:'BB', ab:0, bb:1, bases:1, out:0, kind:'on'},
  'HBP':{lbl:'HP',ab:0, hbp:1, bases:1, out:0, kind:'on'},
  'ROE':{lbl:'E', ab:1, bases:1, out:0, kind:'on'},      // reached on error
  'FC':{lbl:'FC', ab:1, bases:1, out:0, kind:'on'},      // fielder's choice
  'SAC':{lbl:'SAC',ab:0, sac:1, bases:0, out:1, kind:'out'},
  'SF':{lbl:'SF', ab:0, sf:1, bases:0, out:1, kind:'out'},
  'K':{lbl:'K',  ab:1, k:1, bases:0, out:1, kind:'out'},
  'F':{lbl:'F',  ab:1, bases:0, out:1, kind:'out'},      // flyout
  'G':{lbl:'G',  ab:1, bases:0, out:1, kind:'out'},      // groundout
  'L':{lbl:'L',  ab:1, bases:0, out:1, kind:'out'},      // lineout
  'P':{lbl:'P',  ab:1, bases:0, out:1, kind:'out'},      // popout
  'DP':{lbl:'DP',ab:1, bases:0, out:1, kind:'out'}       // hit into DP (counts batter out)
};
const RESULT_GROUPS = {
  hits:['1B','2B','3B','HR'],
  on:['BB','HBP','ROE','FC'],
  outs:['K','F','G','L','P'],
  special:['SAC','SF','DP']
};
const NOTATION_CHIPS = ['F7','F8','F9','P3','P4','P6','6-3','4-3','5-3','U3','3U','L6','1-3'];

/* ============================================================
   FIREBASE  —  paste your web-app config between the braces below.
   Get it from: Firebase console → Project settings → "Your apps"
   → Web app → SDK setup & configuration → "Config".
   Leave it empty to run fully offline (data stays on this device).
   Then in Settings set a "League code" — every device using the
   same code shares the same scorebook in real time.
============================================================ */
const FIREBASE_CONFIG = {
  apiKey: "AIzaSyBX4URdZFeB65qWuLMwhWTlvUF9ATGNahY",
  authDomain: "bestball-fantasy.firebaseapp.com",
  projectId: "bestball-fantasy",
  storageBucket: "bestball-fantasy.firebasestorage.app",
  messagingSenderId: "508802372895",
  appId: "1:508802372895:web:f434d17df713bfe8a4cc2a"
};

/* ---------- State ---------- */
const KEY='softball_scorebook_v1';
const THIS_YEAR=new Date().getFullYear();
const DEFAULT_LEAGUE_CODE='church-softball-main';   // fixed shared doc — sync just works, no setup
const syncCode = () => (DB.meta.leagueCode && DB.meta.leagueCode.trim()) || DEFAULT_LEAGUE_CODE;
let DB = load();
let ui = { tab:'games', gameId:null, scoreSide:'away', statScope:'career', statTeam:'all', statSort:{col:'avg',dir:-1}, statView:'batting' };

function blankDB(){
  return { meta:{league:'Church Softball', name:'League Scorebook', season:THIS_YEAR, leagueCode:''}, teams:[], players:[], games:[] };
}
function load(){
  try{ const r=localStorage.getItem(KEY); if(r) return migrate(JSON.parse(r)); }catch(e){}
  return blankDB();
}
function migrate(d){
  d.teams=d.teams||[]; d.players=d.players||[]; d.games=d.games||[];
  d.meta=d.meta||{};
  d.meta.league=d.meta.league||'Church Softball';
  d.meta.name=d.meta.name||'League Scorebook';
  if(d.meta.season==null){ const ys=d.games.map(g=>g.year).filter(Boolean); d.meta.season=ys.length?Math.max(...ys):THIS_YEAR; }
  d.meta.leagueCode=d.meta.leagueCode||'';
  return d;
}
function saveLocal(){ try{ localStorage.setItem(KEY, JSON.stringify(DB)); }catch(e){ toast('Storage full — export a backup'); } }
function save(){ saveLocal(); if(cloud.on && !cloud.applyingRemote) pushCloud(); }
const uid = p => (p||'id')+Math.random().toString(36).slice(2,9);
const curSeason = () => DB.meta.season || THIS_YEAR;

/* ---------- Cloud sync (Firebase Firestore, optional) ---------- */
let cloud = { on:false, ready:false, db:null, fs:null, code:null, writer:uid('w'),
              applyingRemote:false, timer:null, status:'off',
              hydrated:false,        // true once we've seen what's in the cloud
              remoteWeight:0 };      // how much data the cloud currently holds
function cloudConfigured(){ return !!(FIREBASE_CONFIG && FIREBASE_CONFIG.apiKey && FIREBASE_CONFIG.projectId); }
function cloudStatus(s){ cloud.status=s; const el=$('#cloudStatus'); if(el) el.textContent=s; }
// a rough measure of "how much is in here" — used to protect against blank overwrites
function dataWeight(d){
  if(!d) return 0;
  let w=(d.teams?d.teams.length:0)+(d.players?d.players.length:0)+(d.games?d.games.length:0);
  (d.games||[]).forEach(g=>{ w+=Object.keys(g.pa||{}).length; });
  return w;
}
async function initCloud(){
  if(!cloudConfigured()){ cloudStatus('No config'); return; }
  const code=syncCode();
  cloud.hydrated=false;
  cloudStatus('Connecting…');
  try{
    const appMod  = await import('https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js');
    const fsMod   = await import('https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js');
    const app = appMod.getApps && appMod.getApps().length ? appMod.getApp() : appMod.initializeApp(FIREBASE_CONFIG);
    const db = fsMod.getFirestore(app);
    cloud.fs=fsMod; cloud.db=db; cloud.code=code; cloud.on=true; cloud.ready=true;
    const ref = fsMod.doc(db,'scorebooks',code);
    fsMod.onSnapshot(ref, snap=>{ handleSnapshot(snap.data(), snap.metadata.hasPendingWrites); },
      err=>{ cloudStatus('Sync error'); console.warn('[cloud]',err); });
    cloudStatus('Connected ✓');
  }catch(e){
    cloud.on=false;
    const reason=(e && (e.code || e.message)) ? String(e.code||e.message) : 'unknown error';
    cloudStatus('Connect failed: '+reason);
    console.warn('[cloud]',e);
  }
}
// Decide what to do with a cloud snapshot. Returns an action label (handy for tests).
function handleSnapshot(data, hasPendingWrites){
  // (1) Cloud has nothing yet.
  if(!data || !data.payload){
    cloud.remoteWeight=0; cloud.hydrated=true;
    if(dataWeight(DB)>0){ pushCloud(); return 'seed'; }
    cloudStatus('Connected ✓'); return 'empty-wait';
  }
  // (2) Our own write echoing back — don't re-apply, just note the cloud weight.
  if(hasPendingWrites || data.writer===cloud.writer){
    cloud.hydrated=true; cloud.remoteWeight=dataWeight(DB);
    return 'self-echo';
  }
  // (3) A real update from the cloud / another device.
  try{
    const remote=migrate(JSON.parse(data.payload));
    const rw=dataWeight(remote), lw=dataWeight(DB);
    // PROTECTION: never accept a blank cloud over a device that has data.
    if(rw===0 && lw>0){
      cloud.hydrated=true; cloudStatus('Protected — restored from this device');
      pushCloud(); return 'protect-restore';
    }
    cloud.applyingRemote=true;
    DB=remote; saveLocal(); render();
    cloud.remoteWeight=rw; cloud.hydrated=true; cloudStatus('Synced ✓');
    return 'adopt';
  }catch(e){ cloud.hydrated=true; console.warn('[cloud] parse',e); return 'parse-error'; }
  finally{ cloud.applyingRemote=false; }
}
function pushCloud(){
  if(!cloud.on || !cloud.ready) return;
  if(!cloud.hydrated) return;                            // never write before we've seen the cloud
  // HARD GUARD: a device with no data must never overwrite a cloud that has data.
  if(dataWeight(DB)===0 && cloud.remoteWeight>0){
    cloudStatus('Empty here — cloud left untouched');
    return;
  }
  clearTimeout(cloud.timer);
  cloud.timer=setTimeout(async ()=>{
    try{
      const ref=cloud.fs.doc(cloud.db,'scorebooks',cloud.code);
      await cloud.fs.setDoc(ref,{ payload:JSON.stringify(DB), writer:cloud.writer, updated:Date.now() });
      cloud.remoteWeight=dataWeight(DB);
      cloudStatus('Saved to cloud ✓');
    }catch(e){ cloudStatus('Cloud write failed'); console.warn('[cloud]',e); }
  },600);
}

const INN_MIN=7;

  let mx=INN_MIN;
  Object.keys(g.pa).forEach(k=>{ const inn=parseInt(k.split('|')[2]); if(inn>mx) mx=inn; });

}
function paKey(side,pid,inn){ return side+'|'+pid+'|'+inn; }

/* ----- diamond SVG for a recorded PA ----- */
function cellSVG(pa){
  // diamond points: home(50,92) 1B(88,50) 2B(50,8) 3B(12,50)
  const H=[50,92],B1=[88,50],B2=[50,8],B3=[12,50];
  const reached = pa? (pa.scored?4:pa.bases) : -1;
  const isOut = pa && RESULTS[pa.result] && RESULTS[pa.result].out;
  let paths='';
  const seg=(a,b,on)=>`<line x1="${a[0]}" y1="${a[1]}" x2="${b[0]}" y2="${b[1]}" stroke="${on?'#1f4d3a':'#d8cfb4'}" stroke-width="${on?3:1.4}" stroke-linecap="round"/>`;
  // base lines drawn faint always, bold when runner traveled them
  paths+=seg(H,B1, reached>=1);
  paths+=seg(B1,B2, reached>=2);
  paths+=seg(B2,B3, reached>=3);
  paths+=seg(B3,H, reached>=4);
  let fill='';
  if(pa&&pa.scored){
    fill=`<polygon points="${H} ${B1} ${B2} ${B3}" fill="rgba(176,39,31,.16)"/>`;
  }
  let center='';
  if(pa){
    const txt = pa.notation || RESULTS[pa.result].lbl;
    const col = isOut? '#b0271f' : '#1f4d3a';
    const fs = txt.length>3?16:20;
    center=`<text x="50" y="56" text-anchor="middle" font-family="Roboto Mono,monospace" font-weight="700" font-size="${fs}" fill="${col}">${esc(txt)}</text>`;
  }
  // base dots
  const dot=(pt,on)=> reached>=on ? `<circle cx="${pt[0]}" cy="${pt[1]}" r="3.2" fill="#1f4d3a"/>`:'';
  let dots='';
  if(pa && !isOut){
    dots+=dot(B1,1)+dot(B2,2)+dot(B3,3);
  }
  return `<svg viewBox="0 0 100 100" aria-hidden="true">${fill}${paths}${center}${dots}</svg>`;
}
function cellBadges(pa,outNo){
  let h='';
  if(pa && RESULTS[pa.result] && RESULTS[pa.result].out && outNo) h+=`<span class="outnum">${outNo}</span>`;
  if(pa && pa.rbi>0) h+=`<span class="rbidot">${pa.rbi}rbi</span>`;
  return h;
}
function computeOutOrder(g,side,lineup,innings){
  const map={};
  for(let i=1;i<=innings;i++){
    let outs=0;
    lineup.forEach(pid=>{
      const pa=g.pa[paKey(side,pid,i)];
      if(pa && RESULTS[pa.result] && RESULTS[pa.result].out){ outs++; map[paKey(side,pid,i)]=outs; }
    });
  }
  return map;
}

/* ----- PA editor sheet ----- */
let paDraft=null;
function openPA(side,pid,inn){
  const g=game(ui.gameId);
  const p=player(pid);
  const existing=g.pa[paKey(side,pid,inn)];
  paDraft = existing? JSON.parse(JSON.stringify(existing)) : { result:null, bases:0, scored:false, rbi:0, notation:'' };
  paDraft._side=side; paDraft._pid=pid; paDraft._inn=inn;
  renderPASheet();
}
function renderPASheet(){
  const p=player(paDraft._pid);
  const d=paDraft;
  const sel=r=>d.result===r?'sel':'';
  const grp=(arr,cls)=>arr.map(r=>`<button class="opt ${cls} ${sel(r)}" onclick="pickResult('${r}')">${RESULTS[r].lbl}</button>`).join('');
  let h=`<h2>${esc(p?p.name:'Batter')}</h2><div class="sh-sub">Inning ${d._inn} · record the plate appearance</div>`;

  h+=`<div class="group-label">Hits</div><div class="btn-grid">${grp(RESULT_GROUPS.hits,'hit')}</div>`;
  h+=`<div class="group-label">Reached base</div><div class="btn-grid">${grp(RESULT_GROUPS.on,'')}</div>`;

  h+=`<div class="group-label">Special</div><div class="btn-grid">${grp(RESULT_GROUPS.special,'out')}</div>`;

  if(d.result){
    h+=`<div class="group-label">Running & scoring</div>`;
    h+=`<div class="diamond-edit">${diamondEditSVG(d)}
      <div class="de-side">
        <div class="tag" style="margin-bottom:6px">RBI</div>
        <div class="stepper"><button onclick="bumpRBI(-1)">–</button><div class="val mono">${d.rbi}</div><button onclick="bumpRBI(1)">＋</button></div>
        <div class="hint">Tap a base to mark how far the runner got. Tap home plate to score the run.</div>
      </div></div>`;

    h+=`<div class="notation-row"><input class="inp mono" id="paNote" value="${esc(d.notation)}" placeholder="${RESULTS[d.result].lbl}  (e.g. 6-3, F8)"></div>`;
    h+=`<div class="chiprow">`+NOTATION_CHIPS.map(c=>`<button class="chip" onclick="setNote('${c}')">${c}</button>`).join('')+`</div>`;
  }

  h+=`<div class="sheet-actions">
    <button class="btn ghost" onclick="clearPA()">Clear</button>
    <button class="btn seam grow" onclick="savePA()">Save play</button></div>`;
  openSheet(h);
  const ni=$('#paNote'); if(ni) ni.addEventListener('input',e=>{ paDraft.notation=e.target.value; });
}
function pickResult(r){
  const def=RESULTS[r];
  paDraft.result=r;
  paDraft.bases=def.bases;
  paDraft.scored=!!def.autoScore;
  if(r==='HR'){ paDraft.rbi=Math.max(paDraft.rbi,1); }
  if(def.out){ paDraft.bases=0; paDraft.scored=false; }
  if(!paDraft.notation || Object.values(RESULTS).some(x=>x.lbl===paDraft.notation)) paDraft.notation='';
  renderPASheet();
}
function diamondEditSVG(d){
  const H=[64,116],B1=[116,64],B2=[64,12],B3=[12,64];
  const reached=d.scored?4:d.bases;
  const seg=(a,b,on)=>`<line x1="${a[0]}" y1="${a[1]}" x2="${b[0]}" y2="${b[1]}" stroke="${on?'#1f4d3a':'#d8cfb4'}" stroke-width="${on?4:2}" stroke-linecap="round"/>`;
  let s='';
  if(d.scored) s+=`<polygon points="${H} ${B1} ${B2} ${B3}" fill="rgba(176,39,31,.16)"/>`;
  s+=seg(H,B1,reached>=1)+seg(B1,B2,reached>=2)+seg(B2,B3,reached>=3)+seg(B3,H,reached>=4);
  const cls=(n)=> d.scored&&n===4?'base-dot scored':(reached>=n?'base-dot reached':'base-dot');
  s+=`<circle class="${cls(1)}" cx="${B1[0]}" cy="${B1[1]}" r="9" onclick="setReach(1)"/>`;
  s+=`<circle class="${cls(2)}" cx="${B2[0]}" cy="${B2[1]}" r="9" onclick="setReach(2)"/>`;
  s+=`<circle class="${cls(3)}" cx="${B3[0]}" cy="${B3[1]}" r="9" onclick="setReach(3)"/>`;
  s+=`<rect class="${d.scored?'base-dot scored':'base-dot'}" x="${H[0]-9}" y="${H[1]-9}" width="18" height="18" rx="3" onclick="setReach(4)"/>`;
  return `<svg viewBox="0 0 128 128">${s}</svg>`;
}
function setReach(n){
  if(RESULTS[paDraft.result] && RESULTS[paDraft.result].out) return; // outs don't run
  if(n===4){ paDraft.scored=!paDraft.scored; if(paDraft.scored) paDraft.bases=4; }
  else {
    if(paDraft.bases===n && !paDraft.scored){ paDraft.bases=Math.max(RESULTS[paDraft.result].bases, 0); }
    else { paDraft.bases=n; paDraft.scored=false; }
  }
  renderPASheet();
}
function bumpRBI(n){ paDraft.rbi=Math.max(0,Math.min(4,paDraft.rbi+n)); renderPASheet(); }
function setNote(c){ paDraft.notation=c; const ni=$('#paNote'); if(ni) ni.value=c; }
function savePA(){
  if(!paDraft.result){ toast('Pick a result'); return; }
  const g=game(ui.gameId);
  const k=paKey(paDraft._side,paDraft._pid,paDraft._inn);
  g.pa[k]={ result:paDraft.result, bases:paDraft.bases, scored:paDraft.scored, rbi:paDraft.rbi, notation:paDraft.notation.trim() };
  save(); closeSheet(); render();
}
function clearPA(){
  const g=game(ui.gameId);
  delete g.pa[paKey(paDraft._side,paDraft._pid,paDraft._inn)];
  save(); closeSheet(); render();
}

/* ============================================================
   STAT ROLLUPS
============================================================ */
function emptyLine(){ return {g:0,ab:0,r:0,h:0,d:0,t:0,hr:0,rbi:0,bb:0,hbp:0,sf:0,tb:0,k:0,s1:0}; }
function applyPA(line,pa){
  const def=RESULTS[pa.result]; if(!def) return;
  line.ab+=def.ab||0; line.tb+=def.tb||0; line.k+=def.k||0;
  if(def.hit){ line.h++; if(def.bases===1)line.s1++; if(def.bases===2)line.d++; if(def.bases===3)line.t++; if(def.bases===4)line.hr++; }
  if(def.bb)line.bb++; if(def.hbp)line.hbp++; if(def.sf)line.sf++;
  line.rbi+=pa.rbi||0;
  if(pa.scored)line.r++;
}
function playerGameLine(g,side,pid){
  const line=emptyLine();
  Object.keys(g.pa).forEach(k=>{ const [s,p,inn]=k.split('|'); if(s===side&&p===pid){ applyPA(line,g.pa[k]); } });
  return line;
}
function teamLine(g,side){
  const line=emptyLine();
  g.lineups[side].forEach(pid=>{ const l=playerGameLine(g,side,pid); for(const kk in line) if(kk!=='g') line[kk]+=l[kk]; });
  return line;
}
function inningRuns(g,side,inn){
  let r=0;
  g.lineups[side].forEach(pid=>{ const pa=g.pa[paKey(side,pid,inn)]; if(pa&&pa.scored)r++; });
  return r;
}
function teamHits(g,side){ return teamLine(g,side).h; }
function gameScore(g){ return { away:teamScoreRuns(g,'away'), home:teamScoreRuns(g,'home') }; }
function teamScoreRuns(g,side){ let r=0; const innings=gameInnings(g); for(let i=1;i<=innings;i++) r+=inningRuns(g,side,i); return r; }

// derived
function avg(l){ return l.ab? l.h/l.ab : 0; }
function obp(l){ const d=l.ab+l.bb+l.hbp+l.sf; return d? (l.h+l.bb+l.hbp)/d : 0; }
function slg(l){ return l.ab? l.tb/l.ab : 0; }
function ops(l){ return obp(l)+slg(l); }

/* aggregate a player's line across scope */
function aggregate(pid, scope, teamFilter){
  const line=emptyLine();
  DB.games.forEach(g=>{
    if(scope!=='career' && g.year!=scope) return;
    ['away','home'].forEach(side=>{
      if(teamFilter!=='all' && g[side]!==teamFilter) return;
      if(!g.lineups[side].includes(pid)) return;
      const l=playerGameLine(g,side,pid);
      const played = (l.ab+l.bb+l.hbp+l.sf)>0 || g.lineups[side].includes(pid);
      if(played){ line.g++; for(const kk in line) if(kk!=='g') line[kk]+=l[kk]; }
    });
  });
  return line;
}

function viewStats(){
  const ys=years();
  const scopeOpts=`<option value="career">All-time</option>`+ys.map(y=>`<option value="${y}" ${ui.statScope==y?'selected':''}>${y}</option>`).join('');
  const teamOpts=`<option value="all">All teams</option>`+DB.teams.map(t=>`<option value="${t.id}" ${ui.statTeam===t.id?'selected':''}>${esc(t.name)}</option>`).join('');

  let h=`<div class="section-eyebrow">Statistics</div>`;
  h+=`<div class="seg" style="margin-bottom:12px">
      <button class="${ui.statView==='batting'?'active':''}" onclick="setStatView('batting')">Batting</button>
      <button class="${ui.statView==='standings'?'active':''}" onclick="setStatView('standings')">Standings</button>
    </div>`;
  h+=`<div class="scope-row">
      <select class="sel" onchange="ui.statScope=this.value;render()">${scopeOpts}</select>
      ${ui.statView==='batting'?`<select class="sel" onchange="ui.statTeam=this.value;render()">${teamOpts}</select>`:''}
    </div>`;

  if(ui.statView==='standings') return h+standingsTable();

  // batting
  const rows=DB.players.map(p=>({p, l:aggregate(p.id, ui.statScope, ui.statTeam)}))
    .filter(r=> r.l.ab+r.l.bb+r.l.hbp+r.l.sf>0 || r.l.g>0);
  if(!rows.length) return h+`<div class="empty"><div class="big">📊</div>No stats yet for this scope.<br>Record some games first.</div>`;

  const cols=[
    ['g','G',l=>l.g],['ab','AB',l=>l.ab],['r','R',l=>l.r],['h','H',l=>l.h],
    ['d','2B',l=>l.d],['t','3B',l=>l.t],['hr','HR',l=>l.hr],['rbi','RBI',l=>l.rbi],
    ['bb','BB',l=>l.bb],['avg','AVG',l=>avg(l)],['obp','OBP',l=>obp(l)],['slg','SLG',l=>slg(l)],['ops','OPS',l=>ops(l)]
  ];
  const sc=ui.statSort;
  const getv=(r,col)=>{ const c=cols.find(x=>x[0]===col); return c? c[2](r.l):0; };
  rows.sort((a,b)=> (getv(b,sc.col)-getv(a,sc.col))*(sc.dir<0?1:-1));

  h+=`<div class="stats-scroll"><table class="stats"><thead><tr>
    <th class="lname" onclick="sortStat('name')">Player</th>`;
  cols.forEach(c=> h+=`<th onclick="sortStat('${c[0]}')">${c[1]}${sc.col===c[0]?(sc.dir<0?' ▼':' ▲'):''}</th>`);
  h+=`</tr></thead><tbody>`;
  rows.forEach(r=>{
    const t=team(r.p.teamId);
    h+=`<tr><td class="lname">${esc(r.p.name)}<div class="tag">${esc(t?t.name:'')}</div></td>`;
    cols.forEach(c=>{
      const v=c[2](r.l);
      const isRate=['avg','obp','slg','ops'].includes(c[0]);
      h+=`<td class="${(c[0]==='avg'||c[0]==='ops')?'hl':''}">${isRate?fmt3(v):v}</td>`;
    });
    h+=`</tr>`;
  });
  h+=`</tbody></table></div>`;
  h+=`<button class="btn block ghost sm" style="margin-top:12px" onclick="exportStatsCSV()">⤓ Export CSV</button>`;
  return h;
}
function setStatView(v){ ui.statView=v; render(); }
function sortStat(col){ if(col==='name'){ ui.statSort={col:'name',dir:1}; } else { if(ui.statSort.col===col) ui.statSort.dir*=-1; else ui.statSort={col,dir:-1}; } render(); }

function standingsTable(){
  const scope=ui.statScope;
  const tbl={};
  DB.teams.forEach(t=> tbl[t.id]={t,w:0,l:0,tie:0,rf:0,ra:0});
  DB.games.forEach(g=>{
    if(scope!=='career' && g.year!=scope) return;
    if(!g.final) return;
    const s=gameScore(g);
    if(!tbl[g.away]||!tbl[g.home]) return;
    tbl[g.away].rf+=s.away; tbl[g.away].ra+=s.home;
    tbl[g.home].rf+=s.home; tbl[g.home].ra+=s.away;
    if(s.away>s.home){ tbl[g.away].w++; tbl[g.home].l++; }
    else if(s.home>s.away){ tbl[g.home].w++; tbl[g.away].l++; }
    else { tbl[g.away].tie++; tbl[g.home].tie++; }
  });
  const rows=Object.values(tbl).filter(r=>r.w+r.l+r.tie>0);
  if(!rows.length) return `<div class="empty"><div class="big">🏆</div>No final games yet.<br>Mark games <b>FINAL</b> to build standings.</div>`;
  rows.sort((a,b)=> (b.w-b.l)-(a.w-a.l) || (b.rf-b.ra)-(a.rf-a.ra));
  let h=`<div class="stats-scroll"><table class="stats standings"><thead><tr>
    <th class="lname">Team</th><th>W</th><th>L</th><th>T</th><th>RF</th><th>RA</th><th>DIFF</th></tr></thead><tbody>`;
  rows.forEach(r=>{
    const diff=r.rf-r.ra;
    h+=`<tr><td class="lname">${esc(r.t.name)}</td><td>${r.w}</td><td>${r.l}</td><td>${r.tie||0}</td>
      <td>${r.rf}</td><td>${r.ra}</td><td class="${diff>=0?'':'hl'}">${diff>0?'+':''}${diff}</td></tr>`;
  });
  h+=`</tbody></table></div>`;
  return h;
}
function exportStatsCSV(){
  const rows=DB.players.map(p=>({p,l:aggregate(p.id,ui.statScope,ui.statTeam)})).filter(r=>r.l.g>0);
  const head=['Player','Team','G','AB','R','H','2B','3B','HR','RBI','BB','HBP','SF','AVG','OBP','SLG','OPS'];
  const lines=[head.join(',')];
  rows.forEach(r=>{const t=team(r.p.teamId);const l=r.l;
    lines.push([r.p.name,t?t.name:'',l.g,l.ab,l.r,l.h,l.d,l.t,l.hr,l.rbi,l.bb,l.hbp,l.sf,fmt3(avg(l)),fmt3(obp(l)),fmt3(slg(l)),fmt3(ops(l))].map(x=>`"${String(x).replace(/"/g,'""')}"`).join(','));
  });
  download(`stats_${ui.statScope}.csv`, lines.join('\n'));
}

function savePlayer(pid){
  const p=player(pid); p.name=$('#epName').value.trim()||p.name; p.pos=$('#epPos').value.trim(); p.num=$('#epNum').value.trim();
  const newTeam=$('#epTeam').value;
  if(newTeam!==p.teamId){
    const old=team(p.teamId); if(old) old.roster=old.roster.filter(x=>x!==pid);
    const nt=team(newTeam); if(nt && !nt.roster.includes(pid)) nt.roster.push(pid);
    p.teamId=newTeam;
  }
  save(); closeSheet(); render();
}
function deletePlayer(pid){
  if(!confirm('Delete this player? Their stats and any scoring tied to them will be lost.')) return;
  const p=player(pid); const t=team(p.teamId); if(t) t.roster=t.roster.filter(x=>x!==pid);
  DB.players=DB.players.filter(x=>x.id!==pid);
  DB.games.forEach(g=>{ ['away','home'].forEach(s=>{ g.lineups[s]=g.lineups[s].filter(x=>x!==pid); }); Object.keys(g.pa).forEach(k=>{ if(k.split('|')[1]===pid) delete g.pa[k]; }); });
  save(); closeSheet(); render();
}

    <div class="hint">${cloudLine}</div>
    <div class="row" style="margin-top:10px;gap:8px;align-items:center">
      <span class="pill">Status: <b id="cloudStatus" style="margin-left:4px">${esc(cloud.status==='off'?(cfg?'Starting…':'Offline (no config)'):cloud.status)}</b></span>
      ${cfg?`<button class="btn ghost sm" onclick="reconnectCloud()">Reconnect</button>`:''}
    </div>

    <div class="group-label">Backup</div>
    <div class="hint">Data lives on this device. Export a backup before clearing your browser or moving phones.</div>
    <div class="row" style="gap:8px;margin-top:10px">
      <button class="btn ghost grow sm" onclick="exportBackup()">⤓ Export</button>
      <button class="btn ghost grow sm" onclick="importBackup()">⤒ Import</button>
    </div>

    <div class="group-label">Reset</div>
    <button class="btn block ghost sm danger" onclick="clearAllData()">Clear all data on this device</button>

    <div class="group-label">About</div>
    <div class="hint">Slow-pitch softball scorebook · automatic season &amp; career stats · works offline.</div>`);
}
function saveMeta(){ DB.meta.league=$('#stLeague').value.trim()||DB.meta.league; DB.meta.name=$('#stName').value.trim()||DB.meta.name; save(); render(); toast('Saved'); }

/* season */
function advanceSeason(){ DB.meta.season=curSeason()+1; save(); render(); openSettings(); toast('Season is now '+DB.meta.season); }
function setSeasonManual(){ const y=parseInt($('#stSeason').value); if(!y){ toast('Enter a year'); return; } DB.meta.season=y; save(); render(); openSettings(); toast('Season set to '+y); }

/* schedule */
function addScheduled(){
  const away=$('#scAway').value, home=$('#scHome').value;
  if(away===home){ toast('Pick two different teams'); return; }
  makeGame($('#scDate').value, curSeason(), away, home, '');
  save(); openSettings(); toast('Game added to schedule');
}
function deleteScheduled(id){
  const g=game(id);
  const hasScore=g && Object.keys(g.pa).length;
  if(hasScore && !confirm('This game has scoring recorded. Delete it anyway?')) return;
  DB.games=DB.games.filter(x=>x.id!==id); save(); openSettings();
}
function genRoundRobin(){
  if(DB.teams.length<2){ toast('Need at least two teams'); return; }
  const start=new Date($('#rrStart').value||new Date());
  if(isNaN(start)){ toast('Pick a start date'); return; }
  const ids=DB.teams.map(t=>t.id), pairs=[];
  for(let i=0;i<ids.length;i++) for(let j=i+1;j<ids.length;j++) pairs.push([ids[i],ids[j]]);
  if(!confirm(`Create ${pairs.length} game${pairs.length===1?'':'s'} for ${curSeason()}, one per week from ${$('#rrStart').value}?`)) return;
  let d=new Date(start);
  pairs.forEach((p,idx)=>{
    const away= idx%2? p[1]:p[0], home= idx%2? p[0]:p[1];
    makeGame(d.toISOString().slice(0,10), curSeason(), away, home, 'Round robin');
    d.setDate(d.getDate()+7);
  });
  save(); openSettings(); toast(pairs.length+' games scheduled');
}

/* cloud */
function reconnectCloud(){
  if(!cloudConfigured()){ cloudStatus('No config'); toast('Add Firebase config in the code first'); return; }
  cloud.on=false; cloud.ready=false; cloudStatus('Connecting…'); initCloud();
}

function exportBackup(){ download('scorebook_backup_'+new Date().toISOString().slice(0,10)+'.json', JSON.stringify(DB,null,2)); }
function importBackup(){
  const inp=document.createElement('input'); inp.type='file'; inp.accept='.json,application/json';
  inp.onchange=()=>{ const f=inp.files[0]; if(!f) return; const rd=new FileReader();
    rd.onload=()=>{ try{ const d=migrate(JSON.parse(rd.result)); if(!confirm('Replace all current data with this backup?')) return; DB=d; save(); closeSheet(); ui.tab='games'; render(); toast('Backup loaded'); }catch(e){ toast('Could not read that file'); } };
    rd.readAsText(f); };
  inp.click();
}
function clearAllData(){
  const synced = cloud.on;
  const msg = synced
    ? 'Erase everything on THIS device? Because you’re synced, the shared cloud copy is protected and your data will reload from the cloud. To truly start over you’d clear every device.'
    : 'Erase all teams, players, games and stats on this device? Export a backup first if you want to keep them.';
  if(!confirm(msg)) return;
  if(!confirm('Are you sure?')) return;
  DB=blankDB(); saveLocal(); closeSheet(); ui.tab='games'; ui.gameId=null; render(); toast('Cleared on this device');
}
function download(name,text){
  const blob=new Blob([text],{type:'text/plain'}); const url=URL.createObjectURL(blob);
  const a=document.createElement('a'); a.href=url; a.download=name; document.body.appendChild(a); a.click();
  setTimeout(()=>{ URL.revokeObjectURL(url); a.remove(); },200);
}

/* ---------- boot ---------- */
render();
if(cloudConfigured()) initCloud();   // auto-sync, no setup needed
</script>
</body>
</html>
